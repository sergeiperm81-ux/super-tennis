name: Social Poster — Bluesky

on:
  schedule:
    # 2026-05-30: halved from */30 to hourly to cut GitHub Actions minutes.
    # Each run bills >=1 minute (GitHub rounds up), so 32 slots/day was
    # ~960 billed min/month even though most runs are seconds long. Hourly
    # = 16 slots/day from 5:00-20:00 UTC (08:00-23:00 Sofia). We post ~20
    # news/day and the script posts multiple per run on backlog, so a
    # 16-slot spread still clears the queue.
    - cron: '0 5-20 * * *'
  workflow_dispatch: {}

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Post one news to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/post-to-bluesky.mjs
