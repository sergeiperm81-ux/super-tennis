name: Cleanup YouTube Orphans (one-shot)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list only)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      limit:
        description: 'Max videos to delete'
        required: false
        default: '100'
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install --no-save --no-audit --no-fund @supabase/supabase-js googleapis

      - name: Run cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          ARGS="$ARGS --limit ${{ inputs.limit }}"
          echo "Args: $ARGS"
          node scripts/cleanup-youtube-shorts.mjs $ARGS
