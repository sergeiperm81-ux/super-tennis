name: Content Factory — YouTube Shorts

on:
  # 3 times/day: 07:00, 13:00, 19:00 UTC (≈ 09:00, 15:00, 21:00 CET)
  schedule:
    - cron: '0 7 * * *'   # Morning
    - cron: '0 13 * * *'  # Afternoon
    - cron: '0 19 * * *'  # Evening
  workflow_dispatch: {}    # Manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-factory

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download backgrounds from release
        run: |
          mkdir -p backgrounds
          gh release download backgrounds-v1 --pattern '*.tar.gz' --dir /tmp --clobber
          tar xzf /tmp/backgrounds.tar.gz -C backgrounds/
          echo "Backgrounds: $(ls backgrounds/*.mp4 | wc -l) files"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download fonts
        run: |
          mkdir -p fonts
          curl -sL "https://github.com/rsms/inter/raw/master/fonts/desktop/Inter-Bold.otf" -o fonts/Inter-Bold.ttf
          curl -sL "https://github.com/rsms/inter/raw/master/fonts/desktop/Inter-Regular.otf" -o fonts/Inter-Regular.ttf

      - name: Run content factory
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VIDEOS_PER_RUN: '1'
        run: node src/daily-run.js
