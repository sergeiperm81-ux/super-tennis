name: Content Factory — YouTube Shorts

on:
  # 3 videos/day spread across global tennis-fan time zones:
  #   09:00 Sofia (06:00 UTC) — EU morning, peak Asian users
  #   14:00 Sofia (11:00 UTC) — US east-coast morning, EU lunch
  #   19:00 Sofia (16:00 UTC) — EU evening, US east-coast lunch
  # Each run uploads 1 video. Quota: 3 × 1600 = 4800 of 10K daily — safe.
  schedule:
    - cron: '0 6 * * *'    # 09:00 Sofia
    - cron: '0 11 * * *'   # 14:00 Sofia
    - cron: '0 16 * * *'   # 19:00 Sofia
  workflow_dispatch: {}    # Manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-factory

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinned to 20 (LTS) on 2026-06-25: Node 22 on the GitHub runner image
          # started throwing undici "Premature close" on every OAuth token fetch
          # (oauth2.googleapis.com/token), which broke all uploads from ~midday
          # while the morning Node-22 run still worked — i.e. a runner-image
          # regression. Node 20 uses a stabler HTTP stack with googleapis.
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download backgrounds from release
        run: |
          mkdir -p backgrounds
          gh release download backgrounds-v1 --pattern '*.tar.gz' --dir /tmp --clobber
          for f in /tmp/backgrounds-p1.tar.gz /tmp/backgrounds-p2.tar.gz /tmp/backgrounds-clean.tar.gz /tmp/backgrounds.tar.gz; do
            [ -f "$f" ] && tar xzf "$f" -C backgrounds/ 2>/dev/null || true
          done
          echo "Backgrounds: $(ls backgrounds/*.mp4 | wc -l) files"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download fonts
        run: |
          mkdir -p fonts
          curl -sL "https://github.com/rsms/inter/raw/master/fonts/desktop/Inter-Bold.otf" -o fonts/Inter-Bold.ttf
          curl -sL "https://github.com/rsms/inter/raw/master/fonts/desktop/Inter-Regular.otf" -o fonts/Inter-Regular.ttf

      - name: Download royalty-free music
        run: |
          mkdir -p music
          gh release download music-v1 --pattern '*.tar.gz' --dir /tmp --clobber
          tar xzf /tmp/music.tar.gz -C music/
          echo "Music tracks: $(ls music/*.mp3 | wc -l) files"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Restore bg-history (background rotation state)
        uses: actions/cache/restore@v4
        with:
          path: content-factory/bg-history.json
          key: bg-history-${{ github.run_number }}
          restore-keys: |
            bg-history-

      - name: Run content factory
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VIDEOS_PER_RUN: '1'
          # Phase 1 funnel flags — set any to '0' to disable / A-B test. Default on.
          YT_DESC_LINK: '1'         # clickable article link + UTM in description
          YT_PLAYER_HASHTAGS: '1'   # human-readable player hashtags (#JannikSinner)
          YT_TOP_COMMENT: '1'       # post top comment with the article link
          YT_UTM_CAMPAIGN: 'shorts' # GA4 utm_campaign label
        run: node src/daily-run.js

      - name: Save bg-history (background rotation state)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: content-factory/bg-history.json
          key: bg-history-${{ github.run_number }}

      - name: Telegram alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\",
              \"text\": \"❌ *YouTube Content Factory FAILED*\\n\\nRun: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"parse_mode\": \"Markdown\",
              \"disable_web_page_preview\": true
            }" || true
