name: Content Factory — YouTube Shorts

on:
  # 1x/day until YouTube Advanced Features unlocks (~mid April)
  # Then switch back to 3x/day: 05:00, 11:00, 17:00 UTC
  schedule:
    - cron: '0 5 * * *'   # 08:00 Sofia (1 video/day limit)
  workflow_dispatch: {}    # Manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-factory

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download backgrounds from release
        run: |
          mkdir -p backgrounds
          gh release download backgrounds-v1 --pattern '*.tar.gz' --dir /tmp --clobber
          tar xzf /tmp/backgrounds.tar.gz -C backgrounds/
          echo "Backgrounds: $(ls backgrounds/*.mp4 | wc -l) files"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download fonts
        run: |
          mkdir -p fonts
          curl -sL "https://github.com/rsms/inter/raw/master/fonts/desktop/Inter-Bold.otf" -o fonts/Inter-Bold.ttf
          curl -sL "https://github.com/rsms/inter/raw/master/fonts/desktop/Inter-Regular.otf" -o fonts/Inter-Regular.ttf

      - name: Download royalty-free music
        run: |
          mkdir -p music
          gh release download music-v1 --pattern '*.tar.gz' --dir /tmp --clobber
          tar xzf /tmp/music.tar.gz -C music/
          echo "Music tracks: $(ls music/*.mp3 | wc -l) files"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run content factory
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VIDEOS_PER_RUN: '1'
        run: node src/daily-run.js
