name: Watchdog — Health Monitor + Telegram Alerts

on:
  schedule:
    # 10:00 Sofia (07:00 UTC) — after news + deploy + first Bluesky posts
    - cron: '0 7 * * *'
    # 16:00 Sofia (13:00 UTC) — afternoon check
    - cron: '0 13 * * *'
  workflow_dispatch: {}

# Allow this workflow to dispatch other workflows (used by Bluesky auto-recovery).
permissions:
  actions: write
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Full health check
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ISSUES=""
          TODAY=$(date -u +%Y-%m-%d)

          echo "=== SUPER.TENNIS Health Check ==="

          # 1. Site availability
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://super.tennis/ || echo "000")
          if [ "$HTTP" != "200" ]; then
            ISSUES="${ISSUES}🔴 Site DOWN (HTTP $HTTP)\n"
            echo "❌ Site: HTTP $HTTP"
          else
            echo "✅ Site: HTTP 200"
          fi

          # 2. News generated today
          NEWS=$(curl -s \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/news?select=id&created_at=gte.$TODAY" \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          if [ "$NEWS" = "0" ]; then
            ISSUES="${ISSUES}🔴 No news generated today\n"
            echo "❌ News: 0 today"
          else
            echo "✅ News: $NEWS today"
          fi

          # 3. Rankings not zero
          RANK_PTS=$(curl -s \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/rankings?select=points&tour=eq.atp&order=ranking_date.desc,ranking.asc&limit=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['points'] if d else 0)" 2>/dev/null || echo "0")
          if [ "$RANK_PTS" = "0" ]; then
            ISSUES="${ISSUES}🔴 Rankings show 0 points (broken update)\n"
            echo "❌ Rankings: 0 points"
          else
            echo "✅ Rankings: top player has $RANK_PTS points"
          fi

          # 4. Bluesky posted today
          BSKY=$(curl -s \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/news?select=id&bluesky_posted_at=gte.$TODAY" \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          if [ "$BSKY" = "0" ]; then
            ISSUES="${ISSUES}🟡 No Bluesky posts today\n"
            echo "⚠️ Bluesky: 0 posts today"
            # Signal next step to auto-recover by triggering the social-poster workflow.
            # 2026-05-15: GitHub Actions scheduled cron occasionally skips runs entirely;
            # rather than waiting for the next scheduled fire, we kick off
            # workflow_dispatch right now so the day doesn't pass without posts.
            echo "bluesky_recovery=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Bluesky: $BSKY posts today"
            echo "bluesky_recovery=false" >> $GITHUB_OUTPUT
          fi

          # 5. Articles count (should be 600+)
          ARTICLES=$(curl -s \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/articles?select=id" \
            -H "Prefer: count=exact" -I 2>/dev/null \
            | grep -i content-range | grep -o '/[0-9]*' | tr -d '/' || echo "0")
          if [ "$ARTICLES" -lt 500 ] 2>/dev/null; then
            ISSUES="${ISSUES}🔴 Only $ARTICLES articles (expected 600+)\n"
            echo "❌ Articles: $ARTICLES"
          else
            echo "✅ Articles: $ARTICLES"
          fi

          # Save results
          if [ -z "$ISSUES" ]; then
            echo "alert=false" >> $GITHUB_OUTPUT
            echo "message=✅ All systems healthy" >> $GITHUB_OUTPUT
          else
            echo "alert=true" >> $GITHUB_OUTPUT
            # Escape for GitHub output
            ESCAPED=$(echo -e "$ISSUES" | tr '\n' '|')
            echo "message=$ESCAPED" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram alert if issues found
        if: steps.check.outputs.alert == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="⚠️ SUPER.TENNIS Health Alert

          $(echo '${{ steps.check.outputs.message }}' | tr '|' '\n')

          Check: https://github.com/${{ github.repository }}/actions"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML" || echo "Telegram send failed"

      # Auto-recover Bluesky — when watchdog detects 0 posts today, kick off
      # the social-poster workflow_dispatch up to 6 times to catch up to the
      # ~12 posts we'd expect by midday. Each manual fire is reliable; only
      # the schedule cron is flaky on GH Actions.
      - name: Auto-recover Bluesky (fire 6 catch-up runs)
        if: steps.check.outputs.bluesky_recovery == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3 4 5 6; do
            echo "Bluesky recovery run $i/6..."
            gh workflow run social-poster.yml -R ${{ github.repository }} || echo "  trigger failed"
            sleep 30
          done

      - name: Notify Telegram about Bluesky recovery
        if: steps.check.outputs.bluesky_recovery == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="🔧 Auto-recovery: fired 6 manual Bluesky workflow runs to catch up today's queue." \
            -d parse_mode="HTML" || true
