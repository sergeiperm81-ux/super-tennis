name: Player Enrichment Boost (Tue+Fri)

on:
  schedule:
    # Tuesday 07:00 UTC (10:00 Sofia) — midweek refresh
    - cron: '0 7 * * 2'
    # Friday 07:00 UTC (10:00 Sofia) — end-of-week refresh
    - cron: '0 7 * * 5'
  workflow_dispatch: # Allow manual trigger

jobs:
  enrich-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40 # 400 players × 1.2s = ~8 min fetch + build/deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Enrich player profiles (top 400)
        # Skips players enriched within 24h (those done on Monday)
        # so this effectively covers ranks 201-400 on Tues, full refresh on Fri
        run: node scripts/enrich-players-tlr.mjs --limit=400
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Build Astro site
        run: npx astro build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name supertennis
