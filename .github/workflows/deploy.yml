name: Build & Deploy

on:
  # Daily rebuild at 04:30 UTC (07:30 Sofia) — after Worker generates news at 04:00 UTC (07:00 Sofia)
  schedule:
    - cron: '30 4 * * *'
  # Trigger from Cloudflare Worker after content generation
  repository_dispatch:
    types: [content-updated]
  # Manual trigger
  workflow_dispatch:
  # Code changes — skip docs, configs, and non-site files
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.*'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'workers/**'
      - 'scripts/**'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Astro build
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-build-${{ hashFiles('src/**', 'public/**', 'astro.config.*') }}
          restore-keys: astro-build-

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npx astro build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name supertennis
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify search engines (IndexNow + sitemap ping)
        if: success()
        run: |
          # IndexNow — instant indexing for Bing, Yandex, Seznam, Naver
          INOW_KEY="91c5dc98807613af2ffb83361ebbd154"
          echo "Submitting sitemap via IndexNow..."
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"super.tennis\",
              \"key\": \"${INOW_KEY}\",
              \"keyLocation\": \"https://super.tennis/${INOW_KEY}.txt\",
              \"urlList\": [\"https://super.tennis/sitemap-index.xml\"]
            }" || true

          # Google — sitemap ping
          echo "Pinging Google sitemap..."
          curl -s "https://www.google.com/ping?sitemap=https://super.tennis/sitemap-index.xml" || true

          echo "Search engines notified"
