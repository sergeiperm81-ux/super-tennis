name: Build & Deploy

on:
  # Trigger from Cloudflare Worker after content generation
  repository_dispatch:
    types: [content-updated]
  # Manual trigger
  workflow_dispatch:
  # Code changes — skip docs, configs, and non-site files
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.*'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'workers/**'
      - 'scripts/**'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Astro build
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-build-${{ hashFiles('src/**', 'public/**', 'astro.config.*') }}
          restore-keys: astro-build-

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npx astro build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name supertennis
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
