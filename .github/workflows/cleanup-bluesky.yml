name: Cleanup Bluesky Orphans (one-shot)

# Manual workflow to delete Bluesky posts that link to soft-deleted news.
# Designed for one-shot runs after a content audit. Should NOT be scheduled.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list only, no actual deletes)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      limit:
        description: 'Max posts to delete in one run (safety cap)'
        required: false
        default: '500'
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install --no-save --no-audit --no-fund @supabase/supabase-js

      - name: Run cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          ARGS="$ARGS --limit ${{ inputs.limit }}"
          echo "Args: $ARGS"
          node scripts/cleanup-bluesky-posts.mjs $ARGS
