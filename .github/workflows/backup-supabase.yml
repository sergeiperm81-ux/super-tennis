name: Supabase Weekly Backup

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Export articles table
        run: |
          curl -sf \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Accept: text/csv" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/articles?select=*&order=id" \
            -o articles.csv
          echo "articles.csv: $(wc -l < articles.csv) rows"

      - name: Export players table
        run: |
          curl -sf \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Accept: text/csv" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/players?select=*&order=id" \
            -o players.csv
          echo "players.csv: $(wc -l < players.csv) rows"

      - name: Export rankings table
        run: |
          curl -sf \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Accept: text/csv" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rankings?select=*&order=id" \
            -o rankings.csv
          echo "rankings.csv: $(wc -l < rankings.csv) rows"

      - name: Export news table
        run: |
          curl -sf \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Accept: text/csv" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/news?select=*&order=id" \
            -o news.csv
          echo "news.csv: $(wc -l < news.csv) rows"

      - name: Bundle backup archive
        run: |
          DATE=$(date -u +%Y-%m-%d)
          tar -czf "supertennis-backup-${DATE}.tar.gz" articles.csv players.csv rankings.csv news.csv
          SIZE=$(du -sh "supertennis-backup-${DATE}.tar.gz" | cut -f1)
          echo "BACKUP_FILE=supertennis-backup-${DATE}.tar.gz" >> $GITHUB_ENV
          echo "BACKUP_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Upload backup as artifact (retained 90 days)
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90

      - name: Telegram success alert
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ *Supabase backup done*%0A${{ env.BACKUP_FILE }} (${{ env.BACKUP_SIZE }})" \
            -d parse_mode=Markdown

      - name: Telegram failure alert
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ *Supabase backup FAILED* — check GitHub Actions" \
            -d parse_mode=Markdown
