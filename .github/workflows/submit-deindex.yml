name: Submit De-index — Soft-deleted news URL_DELETED

# Posts URL_DELETED notifications to Google Indexing API for soft-deleted
# news. Google then drops them from search faster than waiting for re-crawl.
#
# Daily at 12:00 UTC (15:00 Sofia) — 1 hour after the daily bulk-indexing
# job at 11:00 UTC, which uses the same shared 200/day quota. We run AFTER
# bulk-indexing so de-indexing only consumes leftover quota; if there are
# no de-index targets, the job exits in seconds.
#
# Soft-deleted items are tracked via news.deindex_submitted_at column.
# Only items where deindex_submitted_at IS NULL are submitted.

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max URLs to submit'
        default: '200'
        required: false
      dry_run:
        description: 'Dry run (no actual submissions)'
        default: 'false'
        required: false

jobs:
  deindex:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install --no-save --no-audit --no-fund @supabase/supabase-js google-auth-library dotenv

      - name: Submit de-index requests
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS="--limit=${{ inputs.limit || 200 }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/submit-deindex.mjs $ARGS
