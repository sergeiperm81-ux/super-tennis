name = "supertennis-cron"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Single cron trigger — runs daily at 04:00 UTC = 07:00 Sofia (EEST/UTC+3)
# News: every run. Videos: checked inside handler (every 3 days).
[triggers]
crons = ["0 4 * * *"]

# KV namespace for rate limiting (brute-force protection on auth endpoints)
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "1c137d6469484e939146d7d224833e96"
preview_id = "1c137d6469484e939146d7d224833e96"

# Environment variables (non-secret) — set via dashboard or wrangler.toml
# Secrets are set via: wrangler secret put OPENAI_API_KEY (etc.)
